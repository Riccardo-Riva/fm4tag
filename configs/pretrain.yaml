# ════════════════════════════════════════════════════════════════════════════
# fm4tag — pretraining config
#
# Usage:
#   fm4tag-pretrain                                    # all defaults
#   fm4tag-pretrain encoder=saint_small                # swap encoder
#   fm4tag-pretrain augmentation=cutmix_only           # no latent mixup
#   fm4tag-pretrain augmentation=none                  # ablate augmentation
#   fm4tag-pretrain trainer.max_epochs=50              # Hydra dot-notation override
# ════════════════════════════════════════════════════════════════════════════

defaults:
  - data: atlas_tracks
  - augmentation: cutmix_mixup
  - encoder: saint_base
  - optimizer: adamw_cosine
  - trainer: gpu_ddp
  - callbacks: default
  - eval: online
  - _self_

seed:            42
experiment_name: fm4tag_pretrain
output_dir:      outputs

# ── Pretraining loss settings ─────────────────────────────────────────────────
pretrain:
  tasks:           [contrastive, denoising]
  projhead_style:  diff       # diff (two separate heads) | same
  nce_temp:        0.7
  lam0:            1.0        # contrastive loss weight
  lam1:            1.0        # categorical denoising loss weight
  lam2:            10.0       # continuous denoising loss weight

# ── Profiler (disabled by default) ───────────────────────────────────────────
profiler:
  enabled:          false
  type:             simple    # simple | advanced | pytorch
  row_limit:        25
  export_to_chrome: true
  with_stack:       false
  profile_memory:   false
