# SAINT encoder — base size (dim=32, depth=6)
dim:              32
depth:            6
col_heads:        8
row_heads:        8
dim_head:         16
dim_row_head:     64
attn_dropout:     0.0
ff_dropout:       0.0
ff_mult:          1
cont_embeddings:  MLP         # MLP | pos_singleMLP | Noemb
attentiontype:    col         # col | colrow | row | concat
final_mlp_style:  sep         # sep | common
proj_hidden:      null        # null → auto (3/4 × dim × n_tokens)
proj_out:         null        # null → auto (1/2 × dim × n_tokens)
